{% extends 'core/base.html' %}

{% block title %} Dashboard {% endblock %}

{% block content %}
<div style="margin-top:0.5rem; padding-bottom:5rem; padding-top:1rem; border-radius:10px; text-align:center; background-color:lightgray;">
    <h2 style="margin-bottom: 1rem;">My items</h2>
    
    <div style="display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:0.6rem; padding: 0 1rem;">
        {% for item in items %}
        <div>
            <!-- This correctly points to detail, NOT delete -->
            <a href="{% url 'item:detail' item.id %}" style="text-decoration: none; color: inherit;">
                <div style="border-radius:10px; overflow:hidden; background-color:white;">  
                    <img src="{{ item.image.url }}" style="width:100%; height:200px; object-fit:cover; display:block;"> 
                    
                    <div style="padding:0.5rem;">
                        <!-- Changed .title to .name to match your Item model -->
                        <h2 style="font:500 0.8rem 'inter', sans-serif; margin:0;">{{ item.name }}</h2>
                        <p style="color: gray; margin:0;">Price: ${{ item.price }}</p>
                    </div>
                </div>
            </a>
        </div>
        {% empty %}
            <p style="grid-column: span 3; color: gray;">You haven't added any items yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
